<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Lightsaber</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Star Wars Background -->
    <div class="stars"></div>
    <div class="twinkling"></div>

    <!-- Death Star -->
    <div class="death-star">
        <div class="dish"></div>
    </div>

    <!-- Color Selection Controls -->
    <div class="controls">
        <button class="color-btn" data-color="#ff0000" style="background: #ff0000;" title="Red"></button>
        <button class="color-btn" data-color="#0000ff" style="background: #0000ff;" title="Blue"></button>
        <button class="color-btn active" data-color="#03fd4e" style="background: #03fd4e;" title="Green"></button>
        <button class="color-btn" data-color="#800080" style="background: #800080;" title="Purple"></button>
        <button class="color-btn" data-color="#ffd700" style="background: #ffd700;" title="Gold"></button>
    </div>

    <div class="lightsaber">
        <div class="blade"></div>
        <div class="hilt">
            <!-- Emitter -->
            <div class="emitter"></div>
            <div class="emitter-base"></div>
            <!-- Thin Neck -->
            <div class="thin-neck">
                <div class="neck-ring"></div>
                <div class="neck-ring"></div>
            </div>
            <!-- Switch Section -->
            <div class="switch-section">
                <div class="control-box">
                    <div class="switch-btn"></div>
                </div>
            </div>
            <!-- Grip Section -->
            <div class="grip">
                <div class="rib"></div>
                <div class="rib"></div>
                <div class="rib"></div>
                <div class="rib"></div>
                <div class="rib"></div>
                <div class="rib"></div>
                <div class="rib"></div>
                <div class="rib"></div>
                <div class="rib"></div>
            </div>
            <!-- Pommel -->
            <div class="pommel">
                <div class="pommel-base"></div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
